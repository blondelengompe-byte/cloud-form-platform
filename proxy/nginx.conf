upstream formbricks_app {
    server formbricks:3000;
}

server {
    listen 8080;
    server_name ${DOMAIN_NAME};

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 8443 ssl;
    server_name ${DOMAIN_NAME};

    # SSL Configuration (Mounted via volumes)
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

    # Proxy Configuration
    location / {
        proxy_pass http://formbricks_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ModSecurity is enabled by default in the image owasp/modsecurity-crs:nginx-alpine
        # but configured via environment variables in docker-compose.
    }

    # Logging
    access_log /var/log/nginx/access_forms.log;
    error_log /var/log/nginx/error_forms.log warn;
}
