name: Deploy Cloud Form Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Générer le token ECR pour le VPS distant
      - name: Generate ECR Login Token
        id: ecr-token
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region eu-west-3)
          echo "::add-mask::$ECR_TOKEN"
          echo "ECR_TOKEN=$ECR_TOKEN" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Build & Push de l'image Applicative (Formbricks)
      - name: Build & Push Formbricks App
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/form-app:latest .
          docker push $ECR_REGISTRY/form-app:latest

      # Transfert des fichiers de configuration (rsync)
      - name: Install Rsync
        run: sudo apt-get install -y rsync

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ssh_key
          chmod 600 ssh_key

      - name: Copy Config Files to EC2
        run: |
          # Fonction de retry pour rsync
          retry_rsync() {
            local attempt=1
            local max_attempts=3
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts"
              rsync -avz --delete \
                -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=20 -o ServerAliveCountMax=3 -i ssh_key" \
                --rsync-path="mkdir -p /home/ubuntu/cloud-form-platform && rsync" \
                --timeout=60 \
                docker-compose.yml proxy monitoring backups Dockerfile \
                ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/cloud-form-platform/
              
              if [ $? -eq 0 ]; then
                echo "Rsync succeeded!"
                return 0
              fi
              
              echo "Rsync failed, retrying in 5 seconds..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "Rsync failed after $max_attempts attempts"
            return 1
          }
          
          retry_rsync

      # Déploiement automatique sur EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/cloud-form-platform
            cd /home/ubuntu/cloud-form-platform
            
            # Installer rsync si absent (pour les futurs transferts)
            if ! command -v rsync &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y rsync
            fi
            
            # Re-création propre du .env à partir des secrets GitHub
            cat <<EOF > .env
            REGISTRY=${{ steps.login-ecr.outputs.registry }}
            DOMAIN_NAME=${{ secrets.EC2_HOST }}.nip.io
            NEXTAUTH_URL=https://${{ secrets.EC2_HOST }}.nip.io
            WEBAPP_URL=https://${{ secrets.EC2_HOST }}.nip.io
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            POSTGRES_USER=form_admin
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=formbricks
            REDIS_URL=redis://redis:6379
            MODSEC_MODE=${{ vars.MODSEC_MODE || 'DetectionOnly' }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=eu-west-3
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF
            
            # Login ECR avec le token généré sur GitHub Actions
            echo "${{ steps.ecr-token.outputs.ECR_TOKEN }}" | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker compose up -d --scale formbricks=2
            docker image prune -f
            docker compose ps
