name: Deploy Cloud Form Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Generate ECR Login Token
        id: ecr-token
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region eu-west-3)
          echo "::add-mask::$ECR_TOKEN"
          echo "ECR_TOKEN=$ECR_TOKEN" >> $GITHUB_OUTPUT

      - name: Build & Push Formbricks App
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/form-app:latest .
          docker push $ECR_REGISTRY/form-app:latest

      - name: Copy Config Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,proxy,monitoring,backups,Dockerfile"
          target: "/home/ubuntu/cloud-form-platform"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/cloud-form-platform
            cat <<EOF > .env
            REGISTRY=${{ steps.login-ecr.outputs.registry }}
            DOMAIN_NAME=${{ secrets.EC2_HOST }}.nip.io
            NEXTAUTH_URL=https://${{ secrets.EC2_HOST }}.nip.io
            WEBAPP_URL=https://${{ secrets.EC2_HOST }}.nip.io
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            POSTGRES_USER=form_admin
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=formbricks
            REDIS_URL=redis://redis:6379
            MODSEC_MODE=DetectionOnly
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=eu-west-3
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF
            echo "${{ steps.ecr-token.outputs.ECR_TOKEN }}" | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker compose up -d
            docker compose ps
